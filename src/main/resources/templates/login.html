<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	<head>
		<link rel="stylesheet" href="/webjars/bootstrap/5.3.3/css/bootstrap.min.css">
		<link rel="stylesheet" th:href="@{/style.css}">
		<script src="/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
	</head>
	<body>
		<div th:replace="~{fragments/navbar :: navbar}"></div>
		<div class="container-md flex-grow-1 vh-100 d-flex justify-content-center align-items-center">
			<div>
				<form class="border border-secondary border-4 rounded p-5 shadow-sm" th:action="@{/login}" method="post">
					<h1>Login</h1>
					<hr class="pb-5">
					<div class="row mb-3">
					    <div class="col-3">
					        <label for="inputUsername" class="col-form-label">Username</label>
					    </div>
					    <div class="col-9">
					        <input type="text"
					               id="inputUsername"
					               class="form-control border border-secondary">
					    </div>
					</div>
					<div class="row mb-3">
					    <div class="col-3">
					        <label for="inputPassword" class="col-form-label">
					            Password
					        </label>
					    </div>
					    <div class="col-9">
					        <input type="password"
					               id="inputPassword"
					               class="form-control border border-secondary">
					        <span class="form-text">
					            Must be 8-20 characters long.
					        </span>
					    </div>
					</div>
					<div class="row">
					    <div class="offset-3 col-9">
					        <button type="submit"
					                class="btn p-2"
									style="background-color: #cbb2fe; color: white;">
					            Sign In
					        </button>
					    </div>
					</div>
				</form>
			</div>
		</div>
		<div th:replace="~{fragments/footer :: footer}"></div>
	</body>
</html>
